<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Bridge</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/socket.io.js" defer></script>
    <script src="/js/main.js" defer></script>
  </head>
  <body>
    <!-- Login Screen -->
    <div class="login-screen" id="login-screen">
      <div class="login-container">
        <div class="login-header">
          <h1>Voice Bridge</h1>
          <p class="slogan">Talk to the World, As You Are.</p>
        </div>
        <div class="login-form">
          <input id="username" type="text" placeholder="Enter your name" />
          <button id="create-user" class="btn btn-primary">Join</button>
        </div>
      </div>
    </div>

    <!-- Main App Interface -->
    <main class="main-container" id="main-container">
      <!-- Sidebar / Contacts -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Contacts</h2>
          <span class="user-status online">
            <span class="status-indicator"></span>
            <span class="status-text">Online</span>
          </span>
        </div>
        <div class="search-container">
          <input
            type="text"
            placeholder="Search contacts..."
            class="search-input"
          />
          <span class="material-icons search-icon">search</span>
        </div>
        <ul id="allusers" class="contact-list"></ul>
      </aside>

      <!-- Video Call Area -->
      <section class="call-container">
        <!-- Call Status Bar -->
        <div class="call-status-bar">
          <div class="call-info">
            <span id="call-duration">00:00</span>
            <span id="connection-status">Connected</span>
          </div>
          <div class="call-title" id="current-call-user">
            Waiting for call...
          </div>
          <div class="settings-button">
            <a
              href="https://github.com/ankitpokhrel08/live-call-transcribe"
              target="_blank"
              class="github-link"
            >
              <img src="/assets/github.webp" alt="GitHub" class="github-logo" />
            </a>
          </div>
        </div>

        <!-- Video Area -->
        <div class="video-area">
          <div class="remote-video-container">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="remote-user-badge" id="remote-user-badge"></div>
          </div>
          <div class="local-video-container">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="video-badge">You</div>
          </div>
        </div>

        <!-- Transcription Area -->
        <div class="transcription-container" id="transcription-container">
          <div class="transcription-header">
            <h3>Live Transcription</h3>
            <div class="transcription-controls">
              <span class="material-icons transcript-toggle">visibility</span>
            </div>
          </div>
          <div class="transcription-content" id="transcription-content"></div>
        </div>

        <!-- Call Controls -->
        <div class="call-controls">
          <button class="control-button mic-button" id="mic-toggle">
            <span class="material-icons">mic</span>
          </button>
          <button class="control-button video-button" id="video-toggle">
            <span class="material-icons">videocam</span>
          </button>
          <button class="control-button screen-button" id="screen-share">
            <span class="material-icons">screen_share</span>
          </button>
          <button class="control-button end-call" id="end-call-btn">
            <span class="material-icons">call_end</span>
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
